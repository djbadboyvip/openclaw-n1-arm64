name: 构建并同步推送到 DockerHub + GitHub Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write  # 允许推送到 GitHub Packages
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 配置 QEMU（ARM64 支持）
        uses: docker/setup-qemu-action@v3

      - name: 配置 Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 登录 GitHub Packages
      - name: 登录 GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并同时推送到两个平台
      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openclaw-n1-arm64-zh:latest
            ghcr.io/${{ github.repository_owner }}/openclaw-n1-arm64-zh:latest
